<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lyrics Vault Premium</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #007AFF;
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text: #fff;
            --text-dim: #8E8E93;
            --danger: #FF3B30;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: #050505; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        body.lock-scroll { overflow: hidden !important; height: 100vh !important; position: fixed; width: 100%; }

        .app-container {
            width: 100%; max-width: 440px; height: 100vh; background: var(--bg); position: relative;
            display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.4s ease;
        }

        @media (min-width: 600px) {
            .app-container { height: 90vh; max-height: 844px; border-radius: 48px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        }

        header { padding: 60px 24px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        header h1 { font-family: 'Outfit', sans-serif; font-size: 38px; font-weight: 700; letter-spacing: -0.04em; }

        .content { flex: 1; padding: 10px 20px 160px; overflow-y: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .content::-webkit-scrollbar { display: none; }

        .search-pill { 
            display: flex; align-items: center; background: rgba(255,255,255,0.06); 
            border: 1px solid var(--border); border-radius: 100px; padding: 12px 20px; gap: 14px; margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        .search-pill input { 
            background: transparent; border: none; color: white; font-size: 16px; font-family: inherit; outline: none; flex: 1; 
        }

        .song-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
        .song-card {
            background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 28px; padding: 22px; min-height: 180px; display: flex; flex-direction: column; justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.32, 0.72, 0, 1); cursor: pointer; position: relative; overflow: hidden;
        }
        .song-card:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.12); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .song-card-scale { font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--accent); font-weight: 700; letter-spacing: 0.02em; }
        .song-card h3 { font-size: 20px; font-weight: 700; line-height: 1.25; margin-top: 4px; letter-spacing: -0.02em; }
        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .song-tag { background: rgba(255,255,255,0.06); padding: 5px 10px; border-radius: 12px; font-size: 11px; color: var(--text-dim); font-weight: 500; }

        .db-card-actions { 
            position: absolute; bottom: 12px; right: 12px; display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s;
        }
        .song-card:hover .db-card-actions, .song-card:active .db-card-actions { opacity: 1; }
        .action-btn { width: 34px; height: 34px; border-radius: 17px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; backdrop-filter: blur(5px); }
        .action-btn.del { color: var(--danger); }

        .dock-container {
            position: absolute; bottom: 60px; left: 0; right: 0; display: flex; justify-content: center; z-index: 2000; pointer-events: none;
        }
        .dock {
            background: rgba(24, 24, 26, 0.85); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            padding: 8px; border-radius: 40px; display: flex; gap: 6px; border: 1px solid var(--border); pointer-events: auto;
            height: 64px; min-width: 180px; align-items: center; justify-content: center;
        }
        .dock-item {
            width: 50px; height: 50px; border-radius: 25px; color: var(--text-dim); background: transparent; border: none;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .dock-item.active { background: rgba(255, 255, 255, 0.1); color: var(--accent); transform: scale(1.1); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }

        .pin-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            z-index: 5000; display: none; justify-content: center; align-items: center; animation: fadeIn 0.3s ease;
        }
        .pin-content {
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
            padding: 40px 24px; border-radius: 40px; width: 90%; max-width: 340px; text-align: center;
            display: flex; flex-direction: column; gap: 24px;
        }
        .pin-header h2 { font-family: 'Outfit', sans-serif; letter-spacing: 0.15em; font-weight: 800; font-size: 16px; color: var(--text-dim); }
        .pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 30px; }
        .pin-dot { width: 14px; height: 14px; border-radius: 7px; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border); transition: all 0.2s cubic-bezier(0.32, 0.72, 0, 1); }
        .pin-dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); transform: scale(1.3); }
        .pin-dot.error { background: var(--danger); animation: shake 0.4s; }

        .runic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 0 10px; }
        .runic-btn {
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
            color: #fff; font-size: 26px; border-radius: 18px; padding: 18px 0; cursor: pointer;
            transition: all 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .runic-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.9); }

        .modal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px); z-index: 3000; display: none; justify-content: center; align-items: flex-end;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            width: 100%; height: 94%; background: #000; border-top-left-radius: 40px; border-top-right-radius: 40px;
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); animation: slideInUp 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .modal-header { padding: 30px 24px 10px; display: flex; justify-content: space-between; align-items: flex-start; }
        .modal-header h2 { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: -0.03em; max-width: 80%; }
        .close-circle { width: 36px; height: 36px; border-radius: 18px; background: var(--glass); display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; }
        .modal-body { flex: 1; padding: 20px 24px 40px; overflow-y: auto; }
        
        .form-group { margin-bottom: 24px; display: flex; flex-direction: column; gap: 10px; }
        .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em; }
        .form-group input, .form-group textarea { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 16px; padding: 16px; color: white; font-family: inherit; font-size: 16px; outline: none; transition: all 0.2s; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .form-group textarea { height: 180px; resize: none; line-height: 1.6; }

        .primary-btn { background: var(--accent); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 700; font-size: 17px; width: 100%; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .primary-btn:active { transform: scale(0.98); opacity: 0.9; }
        
        .lyrics-pre { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; line-height: 1.8; color: #E5E5EA; white-space: pre-wrap; padding-bottom: 100px; }
    </style>
</head>
<body id="mainBody">

    <div class="app-container">
        <header id="appHeader">
            <h1 id="headerTitle">Vault</h1>
        </header>

        <main class="content">
            <div id="libraryContainer">
                <div class="search-pill"><i data-lucide="search" size="18" style="color:var(--text-dim)"></i><input type="text" placeholder="Search title or tags..." oninput="handleSearch(this.value)"></div>
                <div id="libraryView" class="song-grid"></div>
            </div>
            <div id="databaseContainer" style="display: none;">
                <div id="databaseGrid" class="song-grid"></div>
            </div>
        </main>

        <div class="dock-container">
            <nav class="dock">
                <button class="dock-item active" id="tabLib" onclick="handleTabSwitch('library')"><i data-lucide="library" size="22"></i></button>
                <button class="dock-item" id="tabAdd" onclick="handleTabSwitch('add')"><i data-lucide="plus" size="22"></i></button>
                <button class="dock-item" id="tabDb" onclick="handleTabSwitch('database')"><i data-lucide="database" size="22"></i></button>
            </nav>
        </div>

        <!-- Runic PIN -->
        <div id="pinOverlay" class="pin-overlay">
            <div class="pin-content">
                <div class="pin-header"><h2>SACRED ACCESS</h2></div>
                <div class="pin-dots"><div class="pin-dot"></div><div class="pin-dot"></div></div>
                <div class="runic-grid">
                    <button class="runic-btn" onclick="tapSymbol('ᚦ')">ᚦ</button><button class="runic-btn" onclick="tapSymbol('ᛝ')">ᛝ</button><button class="runic-btn" onclick="tapSymbol('ᛟ')">ᛟ</button>
                    <button class="runic-btn" onclick="tapSymbol('ᚴ')">ᚴ</button><button class="runic-btn" onclick="tapSymbol('ᚼ')">ᚼ</button><button class="runic-btn" onclick="tapSymbol('ᛘ')">ᛘ</button>
                    <button class="runic-btn" onclick="tapSymbol('ᛚ')">ᛚ</button><button class="runic-btn" onclick="tapSymbol('ᛒ')">ᛒ</button><button class="runic-btn" onclick="tapSymbol('ᛞ')">ᛞ</button>
                </div>
                <button style="background:none; border:none; color:var(--text-dim); font-weight:700; margin-top:10px; cursor:pointer;" onclick="closePin()">ABORT</button>
            </div>
        </div>

        <!-- Modals -->
        <div id="formModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="formTitle">Add Song</h2>
                    <button class="close-circle" onclick="closeForm()"><i data-lucide="x" size="20"></i></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="form-group"><label>Title</label><input type="text" id="addTitle" placeholder="Song Title"></div>
                    <div class="form-group"><label>Scale</label><input type="text" id="addScale" placeholder="e.g. D Minor"></div>
                    <div class="form-group"><label>Tags</label><input type="text" id="addTags" placeholder="fast, acoustic, wedding (comma separated)"></div>
                    <div class="form-group"><label>Lyrics</label><textarea id="addLyrics" placeholder="Enter lyrics here..."></textarea></div>
                    <button class="primary-btn" onclick="saveSong()"><i data-lucide="check" size="20"></i> Save Song</button>
                </div>
            </div>
        </div>

        <div id="lyricsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="lyricsTitle">Title</h2>
                    <button class="close-circle" onclick="closeLyrics()"><i data-lucide="x" size="20"></i></button>
                </div>
                <div class="modal-body">
                    <pre id="lyricsContent" class="lyrics-pre"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPinVerified = false;
        let pendingTab = null;
        let currentSequence = [];
        const CORRECT = ['ᚼ', 'ᛞ']; // 5th and 9th

        let songs = JSON.parse(localStorage.getItem('songs')) || [
            { id: 1, title: "Prem Ni Aa Season", scale: "D Minor", tags: "fast, wedding", lyrics: "Lyrics content here..." },
            { id: 2, title: "Tu Hi Re", scale: "G Major", tags: "romantic", lyrics: "Lyrics content here..." }
        ];

        function handleTabSwitch(tab) {
            if (tab === 'library') {
                isPinVerified = false;
                switchTab(tab);
            } else if (isPinVerified) {
                switchTab(tab);
                if (tab === 'add') openAddForm();
            } else {
                pendingTab = tab;
                openPin();
            }
        }

        function tapSymbol(s) {
            currentSequence.push(s);
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => d.classList.toggle('active', currentSequence.length > i));

            if (currentSequence.length === 2) {
                if (JSON.stringify(currentSequence) === JSON.stringify(CORRECT)) {
                    isPinVerified = true;
                    closePin();
                    switchTab(pendingTab);
                    if (pendingTab === 'add') openAddForm();
                } else {
                    dots.forEach(d => d.classList.add('error'));
                    setTimeout(() => {
                        currentSequence = [];
                        dots.forEach(d => { d.classList.remove('active'); d.classList.remove('error'); });
                    }, 500);
                }
            }
        }

        function openPin() { document.getElementById('pinOverlay').style.display = 'flex'; document.body.classList.add('lock-scroll'); }
        function closePin() { document.getElementById('pinOverlay').style.display = 'none'; currentSequence = []; document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active')); document.body.classList.remove('lock-scroll'); }

        function switchTab(tab) {
            document.getElementById('libraryContainer').style.display = tab === 'library' ? 'block' : 'none';
            document.getElementById('databaseContainer').style.display = tab === 'database' ? 'block' : 'none';
            document.getElementById('tabLib').classList.toggle('active', tab === 'library');
            document.getElementById('tabDb').classList.toggle('active', tab === 'database');
            document.getElementById('headerTitle').innerText = tab === 'database' ? 'Database' : 'Vault';
            render();
        }

        function render(search = '') {
            const lib = document.getElementById('libraryView');
            const dbGrid = document.getElementById('databaseGrid');
            lib.innerHTML = ''; dbGrid.innerHTML = '';
            
            const filtered = songs.filter(s => s.title.toLowerCase().includes(search.toLowerCase()) || s.tags.toLowerCase().includes(search.toLowerCase()));

            filtered.forEach(s => {
                const tags = s.tags.split(',').map(t => `<span class="song-tag">${t.trim()}</span>`).join('');
                
                // Card for Library
                const libCard = document.createElement('div');
                libCard.className = 'song-card';
                libCard.innerHTML = `<div class="card-header"><span class="song-card-scale">${s.scale}</span></div><h3>${s.title}</h3><div class="tag-row">${tags}</div>`;
                libCard.onclick = () => showLyrics(s);
                lib.appendChild(libCard);

                // Card for Database (identical design + actions)
                const dbCard = document.createElement('div');
                dbCard.className = 'song-card';
                dbCard.innerHTML = `
                    <div class="card-header"><span class="song-card-scale">${s.scale}</span></div>
                    <h3>${s.title}</h3>
                    <div class="tag-row">${tags}</div>
                    <div class="db-card-actions">
                        <button class="action-btn" onclick="event.stopPropagation(); editSong(${s.id})"><i data-lucide="edit-2" size="16"></i></button>
                        <button class="action-btn del" onclick="event.stopPropagation(); deleteSong(${s.id})"><i data-lucide="trash-2" size="16"></i></button>
                    </div>
                `;
                dbCard.onclick = () => showLyrics(s);
                dbGrid.appendChild(dbCard);
            });
            lucide.createIcons();
        }

        function handleSearch(val) { render(val); }
        function showLyrics(s) { document.getElementById('lyricsTitle').innerText = s.title; document.getElementById('lyricsContent').innerText = s.lyrics; document.getElementById('lyricsModal').style.display = 'flex'; document.body.classList.add('lock-scroll'); }
        function closeLyrics() { document.getElementById('lyricsModal').style.display = 'none'; document.body.classList.remove('lock-scroll'); }
        
        function openAddForm() { document.getElementById('formTitle').innerText = 'Add Song'; document.getElementById('editId').value = ''; document.getElementById('addTitle').value = ''; document.getElementById('addScale').value = ''; document.getElementById('addTags').value = ''; document.getElementById('addLyrics').value = ''; document.getElementById('formModal').style.display = 'flex'; document.body.classList.add('lock-scroll'); }
        function editSong(id) { const s = songs.find(x => x.id === id); document.getElementById('formTitle').innerText = 'Edit Song'; document.getElementById('editId').value = s.id; document.getElementById('addTitle').value = s.title; document.getElementById('addScale').value = s.scale; document.getElementById('addTags').value = s.tags; document.getElementById('addLyrics').value = s.lyrics; document.getElementById('formModal').style.display = 'flex'; document.body.classList.add('lock-scroll'); }
        function closeForm() { document.getElementById('formModal').style.display = 'none'; document.body.classList.remove('lock-scroll'); }

        function saveSong() {
            const id = document.getElementById('editId').value;
            const data = { title: document.getElementById('addTitle').value, scale: document.getElementById('addScale').value, tags: document.getElementById('addTags').value, lyrics: document.getElementById('addLyrics').value };
            if (id) {
                const idx = songs.findIndex(x => x.id == id);
                songs[idx] = { ...songs[idx], ...data };
            } else {
                songs.push({ id: Date.now(), ...data });
            }
            localStorage.setItem('songs', JSON.stringify(songs));
            closeForm(); render();
        }

        function deleteSong(id) { if(confirm('Delete?')) { songs = songs.filter(x => x.id !== id); localStorage.setItem('songs', JSON.stringify(songs)); render(); } }

        render();
        lucide.createIcons();
    </script>
</body>
</html>
