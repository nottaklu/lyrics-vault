<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lyrics Vault Premium</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #007AFF;
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text: #fff;
            --text-dim: #8E8E93;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: #050505; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; }

        .app-container {
            width: 100%; max-width: 440px; height: 100vh; background: var(--bg); position: relative;
            display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.4s ease;
        }

        @media (min-width: 600px) {
            .app-container { height: 90vh; max-height: 844px; border-radius: 48px; border: 1px solid var(--border); }
        }

        header { padding: 50px 24px 10px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; }

        .content { flex: 1; padding: 10px 20px 140px; overflow-y: auto; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        /* Top Search Pill */
        .search-bar-container { padding: 0 4px 20px; }
        .search-pill { 
            display: flex; align-items: center; background: rgba(255,255,255,0.06); 
            border: 1px solid var(--border); border-radius: 100px; padding: 10px 18px; gap: 12px;
        }
        .search-pill input { 
            background: transparent; border: none; color: white; font-size: 15px; font-family: inherit; outline: none; flex: 1; 
        }

        .song-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .song-card {
            background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; padding: 20px; height: 160px; display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; transition: all 0.2s;
        }
        .song-card:active { transform: scale(0.96); background: rgba(255,255,255,0.15); }
        .song-card-scale { font-size: 13px; color: var(--accent); font-weight: 600; }
        .song-card h3 { font-size: 18px; font-weight: 600; line-height: 1.2; }
        
        .mini-pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .mini-pill { background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 100px; font-size: 10px; color: var(--text-dim); }

        /* Database View */
        .db-list { display: flex; flex-direction: column; gap: 12px; }
        .db-item {
            background: var(--glass); border: 1px solid var(--border); padding: 16px 20px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .db-item-actions { display: flex; gap: 10px; }
        .icon-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;
            width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .edit-btn { color: var(--accent); }
        .delete-btn { color: #FF453A; }

        /* Compact Dock */
        .dock {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 6px; border-radius: 40px; display: flex; gap: 4px; border: 1px solid var(--border); z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); height: 60px; min-width: 160px; align-items: center; justify-content: center;
        }
        .dock-item {
            padding: 12px; width: 48px; height: 48px; border-radius: 24px; color: var(--text-dim); background: transparent; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .dock-item.active { background: rgba(255, 255, 255, 0.1); color: var(--accent); transform: scale(1.1); }
        .dock-item:active { transform: scale(0.9); }

        /* Modals */
        .modal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px); z-index: 1000; display: none; justify-content: center; align-items: flex-end;
        }
        .modal-content {
            width: 100%; height: 92%; background: #000; border-top-left-radius: 32px; border-top-right-radius: 32px;
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); animation: slideInUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .modal-header { padding: 30px 24px 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); }
        .modal-close { background: var(--glass); border: none; color: white; width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .modal-body { flex: 1; padding: 30px 24px; overflow-y: auto; }
        
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }
        .form-group input, .form-group textarea {
            background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; font-size: 16px; outline: none;
        }
        .form-group textarea { height: 200px; font-family: 'Fira Code', monospace; }
        .save-btn { background: var(--accent); color: white; padding: 18px; border-radius: 16px; border: none; font-weight: 700; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header-logo { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="app-container">
        <header id="appHeader">
            <h1 id="headerTitle">Lyrics</h1>
            <img src="/logo.png" alt="Logo" class="header-logo">
        </header>

        <main class="content">
            <div id="libraryContainer">
                <div class="search-bar-container">
                    <div class="search-pill">
                        <i data-lucide="search" size="18" style="color:var(--text-dim)"></i>
                        <input type="text" id="topSearchInput" placeholder="Search songs or tags..." oninput="handleInstantSearch(this.value)">
                    </div>
                </div>
                <div id="libraryView" class="song-grid"></div>
            </div>
            
            <div id="databaseView" class="db-list" style="display: none;"></div>
        </main>

        <nav class="dock">
            <button class="dock-item active" id="tabLib" onclick="switchTab('library')">
                <i data-lucide="library" size="20"></i>
            </button>
            <button class="dock-item" id="tabAdd" onclick="openAddForm()">
                <i data-lucide="plus" size="20"></i>
            </button>
            <button class="dock-item" id="tabDb" onclick="switchTab('database')">
                <i data-lucide="database" size="20"></i>
            </button>
        </nav>

        <!-- Form Modal -->
        <div id="formModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="formTitle">New Song</h2>
                    <button class="modal-close" onclick="closeForm()">
                        <i data-lucide="x" size="20"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="form-group"><label>Title</label><input type="text" id="addTitle"></div>
                    <div class="form-group"><label>Scale</label><input type="text" id="addScale"></div>
                    <div class="form-group"><label>Keywords</label><input type="text" id="addKeywords"></div>
                    <div class="form-group"><label>Lyrics</label><textarea id="addLyrics"></textarea></div>
                    <button class="save-btn" onclick="saveSong()"><i data-lucide="save" size="20"></i><span id="saveBtnText">Save Song</span></button>
                </div>
            </div>
        </div>

        <!-- Lyrics Modal -->
        <div id="lyricsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <div><span id="modalScale" style="font-size:12px; color:var(--accent); font-weight:700;">SCALE</span><h2 id="modalTitle" style="margin-top:4px;">Title</h2></div>
                    <button class="modal-close" onclick="closeLyrics()"><i data-lucide="x" size="20"></i></button>
                </div>
                <div class="modal-body"><pre id="modalLyrics" class="lyrics-text"></pre></div>
            </div>
        </div>
    </div>

    <script>
        let songs = JSON.parse(localStorage.getItem('songs')) || [
            { id: 1, title: "Prem Ni Aa Season", scale: "D Minor", keywords: ["fast", "wedding"], lyrics: "[Verse 1]\nPrem ni aa season che..." },
            { id: 2, title: "Tu Hi Re", scale: "G Major", keywords: ["romantic", "bollywood"], lyrics: "[Verse 1]\nTu hi re, tu hi re..." }
        ];

        function render(filter = '') {
            const lib = document.getElementById('libraryView');
            const dbV = document.getElementById('databaseView');
            lib.innerHTML = ''; dbV.innerHTML = '';

            const filtered = songs.filter(s => 
                s.title.toLowerCase().includes(filter.toLowerCase()) || 
                (s.keywords && s.keywords.some(k => k.toLowerCase().includes(filter.toLowerCase())))
            );

            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `<span class="song-card-scale">${s.scale}</span><h3>${s.title}</h3><div class="mini-pill-row">${(s.keywords||[]).slice(0,2).map(k=>`<span class="mini-pill">${k}</span>`).join('')}</div>`;
                card.onclick = () => showLyrics(s);
                lib.appendChild(card);
            });

            songs.forEach(s => {
                const item = document.createElement('div');
                item.className = 'db-item';
                item.innerHTML = `<div class="db-info"><h3>${s.title}</h3><span style="color:var(--accent);font-size:12px;">${s.scale}</span></div><div class="db-item-actions"><button class="icon-btn edit-btn" onclick="editSong(${s.id})"><i data-lucide="edit-2" size="16"></i></button><button class="icon-btn delete-btn" onclick="deleteSong(${s.id})"><i data-lucide="trash-2" size="16"></i></button></div>`;
                dbV.appendChild(item);
            });
            lucide.createIcons();
        }

        function switchTab(tab) {
            document.getElementById('libraryContainer').style.display = tab === 'library' ? 'block' : 'none';
            document.getElementById('databaseView').style.display = tab === 'database' ? 'flex' : 'none';
            document.getElementById('tabLib').classList.toggle('active', tab === 'library');
            document.getElementById('tabDb').classList.toggle('active', tab === 'database');
            document.getElementById('headerTitle').innerText = tab === 'database' ? 'Database' : 'Lyrics';
        }

        function handleInstantSearch(val) { render(val); }

        function openAddForm() {
            document.getElementById('editId').value = '';
            document.getElementById('addTitle').value = '';
            document.getElementById('addScale').value = '';
            document.getElementById('addKeywords').value = '';
            document.getElementById('addLyrics').value = '';
            document.getElementById('formTitle').innerText = 'New Song';
            document.getElementById('saveBtnText').innerText = 'Save Song';
            document.getElementById('formModal').style.display = 'flex';
        }

        function editSong(id) {
            const s = songs.find(x => x.id === id);
            document.getElementById('editId').value = s.id;
            document.getElementById('addTitle').value = s.title;
            document.getElementById('addScale').value = s.scale;
            document.getElementById('addKeywords').value = (s.keywords||[]).join(', ');
            document.getElementById('addLyrics').value = s.lyrics;
            document.getElementById('formTitle').innerText = 'Edit Song';
            document.getElementById('saveBtnText').innerText = 'Update Song';
            document.getElementById('formModal').style.display = 'flex';
        }

        function saveSong() {
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('addTitle').value,
                scale: document.getElementById('addScale').value,
                keywords: document.getElementById('addKeywords').value.split(',').map(k=>k.trim()).filter(k=>k!==''),
                lyrics: document.getElementById('addLyrics').value
            };
            if (!data.title) return alert('Title required');

            if (id) {
                const idx = songs.findIndex(x => x.id == id);
                songs[idx] = { ...songs[idx], ...data };
            } else {
                songs.push({ id: Date.now(), ...data });
            }
            localStorage.setItem('songs', JSON.stringify(songs));
            closeForm(); render(); switchTab('database');
        }

        function deleteSong(id) {
            if (confirm('Delete?')) {
                songs = songs.filter(x => x.id !== id);
                localStorage.setItem('songs', JSON.stringify(songs));
                render();
            }
        }

        function showLyrics(s) {
            document.getElementById('modalTitle').innerText = s.title;
            document.getElementById('modalScale').innerText = s.scale;
            document.getElementById('modalLyrics').innerText = s.lyrics;
            document.getElementById('lyricsModal').style.display = 'flex';
        }

        function closeForm() { document.getElementById('formModal').style.display = 'none'; }
        function closeLyrics() { document.getElementById('lyricsModal').style.display = 'none'; }

        render();
    </script>
</body>
</html>
