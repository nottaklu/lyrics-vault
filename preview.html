<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lyrics Vault Premium</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #007AFF;
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text: #fff;
            --text-dim: #8E8E93;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: #050505; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        body.lock-scroll { overflow: hidden !important; height: 100vh !important; }

        .app-container {
            width: 100%; max-width: 440px; height: 100vh; background: var(--bg); position: relative;
            display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.4s ease;
        }

        @media (min-width: 600px) {
            .app-container { height: 90vh; max-height: 844px; border-radius: 48px; border: 1px solid var(--border); }
        }

        header { padding: 50px 24px 10px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; }

        .content { flex: 1; padding: 10px 20px 140px; overflow-y: auto; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .search-pill { 
            display: flex; align-items: center; background: rgba(255,255,255,0.06); 
            border: 1px solid var(--border); border-radius: 100px; padding: 10px 18px; gap: 12px; margin-bottom: 20px;
        }
        .search-pill input { 
            background: transparent; border: none; color: white; font-size: 15px; font-family: inherit; outline: none; flex: 1; 
        }

        .song-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .song-card {
            background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; padding: 20px; height: 160px; display: flex; flex-direction: column; justify-content: space-between;
            transition: all 0.2s;
        }
        .song-card-scale { font-size: 13px; color: var(--accent); font-weight: 600; }
        .song-card h3 { font-size: 18px; font-weight: 600; line-height: 1.2; }
        .mini-pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .mini-pill { background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 100px; font-size: 10px; color: var(--text-dim); }

        .dock {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 6px; border-radius: 40px; display: flex; gap: 4px; border: 1px solid var(--border); z-index: 100;
            height: 60px; min-width: 160px; align-items: center; justify-content: center;
        }
        .dock-item {
            padding: 12px; width: 48px; height: 48px; border-radius: 24px; color: var(--text-dim); background: transparent; border: none;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .dock-item.active { background: rgba(255, 255, 255, 0.1); color: var(--accent); transform: scale(1.1); }

        /* Security PIN Overlay */
        .pin-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 3000; display: none; justify-content: center; align-items: center;
        }
        .pin-content {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            padding: 40px 30px; border-radius: 32px; width: 90%; max-width: 320px;
            text-align: center; display: flex; flex-direction: column; gap: 24px;
        }
        .pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 30px; }
        .pin-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border); }
        .pin-dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .pin-dot.error { background: #FF453A; animation: shake 0.4s; }

        .runic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .runic-btn {
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
            color: #fff; font-size: 24px; border-radius: 12px; padding: 15px 0; cursor: pointer;
        }

        .modal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px); z-index: 1000; display: none; justify-content: center; align-items: flex-end;
        }
        .modal-content {
            width: 100%; height: 92%; background: #000; border-top-left-radius: 32px; border-top-right-radius: 32px;
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); animation: slideInUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .modal-body { flex: 1; padding: 30px 24px; overflow-y: auto; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }
        .form-group input, .form-group textarea { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; outline: none; }
        .save-btn { background: var(--accent); color: white; padding: 18px; border-radius: 16px; border: none; font-weight: 700; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body id="mainBody">

    <div class="app-container">
        <header id="appHeader">
            <h1 id="headerTitle">Lyrics</h1>
        </header>

        <main class="content">
            <div id="libraryContainer">
                <div class="search-pill"><i data-lucide="search" size="18" style="color:var(--text-dim)"></i><input type="text" placeholder="Search..." oninput="handleInstantSearch(this.value)"></div>
                <div id="libraryView" class="song-grid"></div>
            </div>
            <div id="databaseView" class="db-list" style="display: none;"></div>
        </main>

        <nav class="dock">
            <button class="dock-item active" id="tabLib" onclick="handleTabSwitch('library')"><i data-lucide="library" size="20"></i></button>
            <button class="dock-item" id="tabAdd" onclick="handleTabSwitch('add')"><i data-lucide="plus" size="20"></i></button>
            <button class="dock-item" id="tabDb" onclick="handleTabSwitch('database')"><i data-lucide="database" size="20"></i></button>
        </nav>

        <div id="pinOverlay" class="pin-overlay">
            <div class="pin-content">
                <h2 style="letter-spacing: 0.1em; font-weight: 900;">ACCESS RESTRICTED</h2>
                <div class="pin-dots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
                <div class="runic-grid">
                    <button class="runic-btn" onclick="tapSymbol('ᚦ')">ᚦ</button><button class="runic-btn" onclick="tapSymbol('ᛝ')">ᛝ</button><button class="runic-btn" onclick="tapSymbol('ᛟ')">ᛟ</button>
                    <button class="runic-btn" onclick="tapSymbol('ᚴ')">ᚴ</button><button class="runic-btn" onclick="tapSymbol('ᚼ')">ᚼ</button><button class="runic-btn" onclick="tapSymbol('ᛘ')">ᛘ</button>
                    <button class="runic-btn" onclick="tapSymbol('ᛚ')">ᛚ</button><button class="runic-btn" onclick="tapSymbol('ᛒ')">ᛒ</button><button class="runic-btn" onclick="tapSymbol('ᛞ')">ᛞ</button>
                </div>
                <button style="background:none; border:none; color:var(--text-dim); margin-top:10px;" onclick="closePin()">ABORT</button>
            </div>
        </div>

        <!-- Modals kept identical as previous -->
        <div id="formModal" class="modal"><div class="modal-content"><div class="modal-body"><input type="hidden" id="editId"><div class="form-group"><label>Title</label><input type="text" id="addTitle"></div><div class="form-group"><label>Lyrics</label><textarea id="addLyrics"></textarea></div><button class="save-btn" onclick="saveSong()">Save</button><button style="background:none; border:none; color:grey; margin-top:10px;" onclick="closeForm()">Cancel</button></div></div></div>
        <div id="lyricsModal" class="modal"><div class="modal-content"><div class="modal-body"><h2 id="modalTitle"></h2><pre id="modalLyrics" style="white-space:pre-wrap; font-family:monospace; color:#ccc;"></pre><button class="save-btn" onclick="closeLyrics()">Close</button></div></div></div>
    </div>

    <script>
        let isPinVerified = false;
        let pendingTab = null;
        let currentSequence = [];
        const CORRECT = ['ᚦ', 'ᛝ', 'ᛟ', 'ᚴ'];

        let songs = JSON.parse(localStorage.getItem('songs')) || [
            { id: 1, title: "Prem Ni Aa Season", lyrics: "Lyrics..." },
            { id: 2, title: "Tu Hi Re", lyrics: "Lyrics..." }
        ];

        function handleTabSwitch(tab) {
            if (tab === 'library') {
                isPinVerified = false;
                switchTab(tab);
            } else if (isPinVerified) {
                switchTab(tab);
                if (tab === 'add') openAddForm();
            } else {
                pendingTab = tab;
                openPin();
            }
        }

        function tapSymbol(s) {
            currentSequence.push(s);
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => d.classList.toggle('active', currentSequence.length > i));

            if (currentSequence.length === 4) {
                if (JSON.stringify(currentSequence) === JSON.stringify(CORRECT)) {
                    isPinVerified = true;
                    closePin();
                    switchTab(pendingTab);
                    if (pendingTab === 'add') openAddForm();
                } else {
                    dots.forEach(d => d.classList.add('error'));
                    setTimeout(() => {
                        currentSequence = [];
                        dots.forEach(d => { d.classList.remove('active'); d.classList.remove('error'); });
                    }, 500);
                }
            }
        }

        function openPin() {
            document.getElementById('pinOverlay').style.display = 'flex';
            document.getElementById('mainBody').classList.add('lock-scroll');
        }

        function closePin() {
            document.getElementById('pinOverlay').style.display = 'none';
            currentSequence = [];
            document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active'));
            document.getElementById('mainBody').classList.remove('lock-scroll');
        }

        function switchTab(tab) {
            document.getElementById('libraryContainer').style.display = tab === 'library' ? 'block' : 'none';
            document.getElementById('databaseView').style.display = tab === 'database' ? 'flex' : 'none';
            document.getElementById('tabLib').classList.toggle('active', tab === 'library');
            document.getElementById('tabDb').classList.toggle('active', tab === 'database');
            document.getElementById('headerTitle').innerText = tab === 'database' ? 'Database' : 'Lyrics';
        }

        function render(filter = '') {
            const lib = document.getElementById('libraryView');
            const dbV = document.getElementById('databaseView');
            lib.innerHTML = ''; dbV.innerHTML = '';
            songs.forEach(s => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `<h3>${s.title}</h3>`;
                card.onclick = () => showLyrics(s);
                lib.appendChild(card);

                const item = document.createElement('div');
                item.className = 'db-item'; item.style = 'background:var(--glass); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between;';
                item.innerHTML = `<span>${s.title}</span><button onclick="deleteSong(${s.id})" style="color:red; background:none; border:none;">Del</button>`;
                dbV.appendChild(item);
            });
            lucide.createIcons();
        }

        function showLyrics(s) { document.getElementById('modalTitle').innerText = s.title; document.getElementById('modalLyrics').innerText = s.lyrics; document.getElementById('lyricsModal').style.display = 'flex'; }
        function closeLyrics() { document.getElementById('lyricsModal').style.display = 'none'; }
        function openAddForm() { document.getElementById('formModal').style.display = 'flex'; }
        function closeForm() { document.getElementById('formModal').style.display = 'none'; }
        function saveSong() { /* truncated for brevity */ }

        render();
        lucide.createIcons();
    </script>
</body>
</html>
